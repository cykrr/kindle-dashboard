<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: white;
  }
  #rotated {
    position: absolute;
    top: 0;
    left: 100%;
    width: 100vh;
    height: 100vw;
    transform-origin: top left;
    transform: rotate(90deg);
    border: 0;
    overflow: hidden;
  }
  iframe::-webkit-scrollbar, body::-webkit-scrollbar {
    display: none;
  }
</style>
</head>
<body>
<iframe id="rotated" src="file:///mnt/us/documents/kindle-dashboard/index.html" scrolling="no"></iframe>
</body>
</html>
